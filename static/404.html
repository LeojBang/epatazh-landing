<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Эпатаж</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
    <style>
        :root {
            --green-dark: #0b2a21;
            --green: #0f3a2e;
            --green-line: #1f5240;
            --gold: #c79a3b;
            --gold-soft: #d4af37;
            --on-dark: #f0ede3;
            --on-dark-soft: #a9b5ae;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--green-dark);
            color: var(--on-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1, h2 { font-family: 'Oswald', sans-serif; font-weight: 600; }
        a { color: inherit; text-decoration: none; }

        /* Шапка */
        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(11,42,33,.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--green-line);
            padding: 0 24px;
        }
        .nav__in {
            max-width: 1140px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 68px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gold-soft);
        }
        .brand__name {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .brand__div {
            width: 1px;
            height: 28px;
            background: var(--green-line);
            margin: 0 4px;
        }
        .brand__sub {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--on-dark-soft);
            line-height: 1.3;
        }

        /* Основной блок */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 24px;
            position: relative;
            overflow: hidden;
        }
        /* Диагональные панели как на скриншоте */
        .hero::before,
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .hero::before {
            background: linear-gradient(135deg,
                #0d3326 0%, #0d3326 40%,
                #0b2a21 40%, #0b2a21 100%);
        }
        .hero::after {
            background: linear-gradient(225deg,
                transparent 0%, transparent 55%,
                rgba(15,58,46,0.5) 55%, rgba(15,58,46,0.5) 100%);
        }

        .hero__content {
            position: relative;
            z-index: 1;
        }
        .error-code {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(100px, 22vw, 160px);
            font-weight: 700;
            line-height: 1;
            color: var(--gold-soft);
            margin-bottom: 8px;
        }
        .error-title {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 600;
            color: var(--on-dark);
            margin-bottom: 12px;
        }
        .error-sub {
            font-size: 1rem;
            color: var(--on-dark-soft);
            margin-bottom: 36px;
        }
        .btn {
            display: inline-block;
            background: var(--gold);
            color: var(--green-dark);
            padding: 14px 36px;
            border-radius: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background .2s, transform .2s;
        }
        .btn:hover {
            background: var(--gold-soft);
            transform: translateY(-2px);
        }

        /* Футер */
        .footer {
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--green-line);
            text-align: center;
            padding: 20px 24px;
            font-size: 0.82rem;
            color: var(--on-dark-soft);
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav__in">
        <a href="/" class="brand">
            <span class="brand__name">Эпатаж</span>
            <span class="brand__div"></span>
            <span class="brand__sub">Экипировка<br>для единоборств</span>
        </a>
    </div>
</nav>

<div class="hero">
    <div class="hero__content">
        <div class="error-code">404</div>
        <h1 class="error-title">Страница не найдена</h1>
        <p class="error-sub">Возможно, она была удалена или вы ошиблись адресом.</p>
        <a href="/" class="btn">На главную</a>
    </div>
</div>

<footer class="footer">
    © 2026 Эпатаж — экипировка для единоборств
</footer>

</body>
</html>
